<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VoiceRoom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --danger: #ff4757;
    --text: #e8e8f0;
    --text2: #888899;
    --green: #2ecc71;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── LOBBY ── */
  #lobby {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: radial-gradient(ellipse at 60% 40%, #1a1040 0%, var(--bg) 65%);
  }
  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 400px;
    max-width: 95vw;
    box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(124,106,247,.1);
  }
  .lobby-card h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .lobby-card p {
    color: var(--text2);
    font-size: .85rem;
    margin-bottom: 32px;
    font-family: 'Space Mono', monospace;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: .9rem;
    padding: 12px 16px;
    outline: none;
    transition: border .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-join {
    width: 100%;
    margin-top: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .5px;
    transition: background .2s, transform .1s;
  }
  .btn-join:hover { background: #9380ff; }
  .btn-join:active { transform: scale(.98); }
  .or-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--text2);
    font-size: .75rem;
  }
  .or-row::before, .or-row::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── MAIN APP ── */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; color: var(--accent); }
  .room-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
    transition: border .2s;
  }
  .room-badge:hover { border-color: var(--accent); color: var(--text); }
  .header-spacer { flex: 1; }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .75rem;
    color: var(--text2);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text2);
    transition: background .3s;
  }
  .conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* Body */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar – participants */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 16px 18px 10px;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  #participants-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
  }
  .participant {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    transition: background .15s;
  }
  .participant:hover { background: var(--surface2); }
  .p-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .8rem;
    flex-shrink: 0;
    position: relative;
  }
  .p-avatar .speaking-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--green);
    opacity: 0;
    transition: opacity .2s;
    animation: none;
  }
  .p-avatar.speaking .speaking-ring {
    opacity: 1;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: .8; }
    50% { transform: scale(1.15); opacity: 1; }
  }
  .p-info { flex: 1; min-width: 0; }
  .p-name {
    font-size: .85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .p-name.you::after {
    content: ' (вы)';
    color: var(--text2);
    font-weight: 400;
    font-size: .75rem;
  }
  .p-mute-icon {
    font-size: .85rem;
    color: var(--danger);
    flex-shrink: 0;
  }
  .p-mute-icon.active { display: block; }
  .p-mute-icon:not(.active) { display: none; }

  /* Volume meter */
  .vol-bar-wrap {
    width: 3px;
    height: 20px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .vol-bar {
    width: 100%;
    height: 0%;
    background: var(--green);
    border-radius: 3px;
    transition: height .05s;
    margin-top: auto;
  }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Chat */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    gap: 3px;
  }
  .msg.own { align-self: flex-end; align-items: flex-end; }
  .msg .meta {
    font-size: .7rem;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    padding: 0 4px;
  }
  .msg .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    padding: 10px 14px;
    font-size: .9rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.own .bubble {
    background: var(--accent);
    border-color: transparent;
    border-radius: 14px 14px 4px 14px;
  }

  .sys-msg {
    align-self: center;
    font-size: .75rem;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    background: var(--surface2);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Input bar */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: .9rem;
    padding: 10px 16px;
    outline: none;
    transition: border .2s;
  }
  #chat-input:focus { border-color: var(--accent); }

  .ctrl-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, border-color .2s, transform .1s;
    flex-shrink: 0;
    position: relative;
  }
  .ctrl-btn:hover { background: var(--border); }
  .ctrl-btn:active { transform: scale(.93); }
  .ctrl-btn.muted {
    background: rgba(255,71,87,.15);
    border-color: var(--danger);
    color: var(--danger);
  }
  .ctrl-btn.noise-on {
    background: rgba(78,205,196,.1);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .ctrl-btn-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: .6rem;
    white-space: nowrap;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
  }
  .ctrl-wrap { position: relative; padding-bottom: 18px; }

  .leave-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--danger);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, transform .1s;
    flex-shrink: 0;
    position: relative;
  }
  .leave-btn:hover { background: #ff6b6b; }
  .leave-btn:active { transform: scale(.93); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: .85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    .sidebar { width: 180px; }
    .msg { max-width: 85%; }
  }
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby">
  <div class="lobby-card">
    <h1>VoiceRoom</h1>
    <p>// голосовой чат с шумоподавлением</p>

    <div class="field">
      <label>Ваше имя</label>
      <input id="inp-name" type="text" placeholder="Введите имя" maxlength="24" autocomplete="off"/>
    </div>
    <div class="field">
      <label>ID комнаты</label>
      <input id="inp-room" type="text" placeholder="room-1234" maxlength="32" autocomplete="off"/>
    </div>
    <button class="btn-join" onclick="joinLobby()">Войти в комнату</button>
    <div class="or-row">или</div>
    <button class="btn-join" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2)" onclick="createRoom()">Создать новую комнату</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="header">
    <span class="header-logo">🎙 VoiceRoom</span>
    <span class="room-badge" id="room-id-badge" title="Нажмите чтобы скопировать">—</span>
    <div class="header-spacer"></div>
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Подключение...</span>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-title">Участники <span id="p-count"></span></div>
      <div id="participants-list"></div>
    </div>

    <div class="main">
      <div id="messages"></div>
      <div class="input-bar">
        <div class="ctrl-wrap">
          <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()" title="Микрофон">🎤</button>
          <span class="ctrl-btn-label">микрофон</span>
        </div>
        <div class="ctrl-wrap">
          <button class="ctrl-btn noise-on" id="noise-btn" onclick="toggleNoise()" title="Шумоподавление">🔇</button>
          <span class="ctrl-btn-label">шумоподав.</span>
        </div>
        <input id="chat-input" type="text" placeholder="Написать сообщение..." maxlength="500" autocomplete="off"/>
        <button class="ctrl-btn" onclick="sendChat()" title="Отправить" style="border-color:var(--accent);color:var(--accent)">➤</button>
        <div class="ctrl-wrap">
          <button class="leave-btn" onclick="leaveRoom()" title="Покинуть">✕</button>
          <span class="ctrl-btn-label" style="color:var(--danger)">выйти</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let socket = null;
let localStream = null;
let myId = null;
let myName = '';
let roomId = '';
let muted = false;
let noiseEnabled = true;

// peers: Map<socketId, { pc: RTCPeerConnection, analyser: AnalyserNode }>
const peers = new Map();
// users: Map<socketId, { id, name, muted }>
const users = new Map();

// Noise suppression pipeline
let audioCtx = null;
let sourceNode = null;
let gainNode = null;
let destinationNode = null;
let processedStream = null;

// Volume metering
const meterAnimFrames = new Map();

// ═══════════════════════════════════════════════
//  LOBBY
// ═══════════════════════════════════════════════
function createRoom() {
  const id = 'room-' + Math.random().toString(36).slice(2, 8);
  document.getElementById('inp-room').value = id;
}

async function joinLobby() {
  const name = document.getElementById('inp-name').value.trim();
  const room = document.getElementById('inp-room').value.trim();
  if (!name) return showToast('Введите имя');
  if (!room) return showToast('Введите ID комнаты');

  myName = name;
  roomId = room;

  try {
    await initAudio();
    initSocket();
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('room-id-badge').textContent = roomId;
    document.getElementById('room-id-badge').onclick = copyRoomId;
  } catch(e) {
    showToast('Ошибка микрофона: ' + e.message);
    console.error(e);
  }
}

// ═══════════════════════════════════════════════
//  AUDIO + NOISE SUPPRESSION  (AudioWorklet, no glitches)
// ═══════════════════════════════════════════════

// Worklet code as a Blob URL — runs in dedicated audio thread, zero glitches
const WORKLET_CODE = `
class NoiseGateProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this._noiseFloor = 0;
    this._gateGain   = 0;
    this._holdSamples = 0;
    // params arrive via port
    this._enabled   = true;
    this.port.onmessage = (e) => {
      if (e.data.enabled !== undefined) this._enabled = e.data.enabled;
    };
  }

  static get parameterDescriptors() { return []; }

  process(inputs, outputs) {
    const input  = inputs[0][0];
    const output = outputs[0][0];
    if (!input || !output) return true;

    const SR        = sampleRate;           // global in worklet scope
    const HOLD_SEC  = 0.15;                 // hold gate open 150 ms after speech ends
    const ATTACK_TC = 0.008;               // 8 ms attack  (per-sample coeff)
    const RELEASE_TC= 0.080;               // 80 ms release (per-sample coeff)
    const attackK   = 1 - Math.exp(-1 / (SR * ATTACK_TC));
    const releaseK  = 1 - Math.exp(-1 / (SR * RELEASE_TC));
    const holdLen   = Math.floor(SR * HOLD_SEC);

    // RMS of this block
    let sum = 0;
    for (let i = 0; i < input.length; i++) sum += input[i] * input[i];
    const rms = Math.sqrt(sum / input.length);

    // Very slow adaptive noise floor (leaky max)
    this._noiseFloor = Math.max(this._noiseFloor * 0.9998 + rms * 0.0002, 1e-6);
    const threshold = this._enabled
      ? Math.max(this._noiseFloor * 4.0, 0.005)
      : 0;

    const gateOpen = !this._enabled || rms > threshold;
    if (gateOpen) {
      this._holdSamples = holdLen;
    } else {
      this._holdSamples = Math.max(0, this._holdSamples - input.length);
    }
    const targetGain = (gateOpen || this._holdSamples > 0) ? 1.0 : 0.0;

    // Per-sample smooth gain — eliminates clicks/crackle
    for (let i = 0; i < output.length; i++) {
      const k = targetGain > this._gateGain ? attackK : releaseK;
      this._gateGain += (targetGain - this._gateGain) * k;
      output[i] = input[i] * this._gateGain;
    }
    return true;
  }
}
registerProcessor('noise-gate', NoiseGateProcessor);
`;

let workletNode = null;

async function initAudio() {
  const constraints = {
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true,
      sampleRate: 48000,
      channelCount: 1
    }
  };
  localStream = await navigator.mediaDevices.getUserMedia(constraints);
  await buildAudioPipeline();
}

async function buildAudioPipeline() {
  if (audioCtx) audioCtx.close();

  audioCtx = new AudioContext({ sampleRate: 48000, latencyHint: 'interactive' });

  // Register worklet from blob (no external file needed)
  const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
  const blobUrl = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(blobUrl);
  URL.revokeObjectURL(blobUrl);

  sourceNode = audioCtx.createMediaStreamSource(localStream);

  // Noise gate worklet
  workletNode = new AudioWorkletNode(audioCtx, 'noise-gate', {
    numberOfInputs: 1, numberOfOutputs: 1,
    outputChannelCount: [1]
  });
  workletNode.port.postMessage({ enabled: noiseEnabled });

  // Light compressor to smooth peaks without distortion
  const compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.knee.value       = 10;
  compressor.ratio.value      = 3;
  compressor.attack.value     = 0.003;
  compressor.release.value    = 0.15;

  gainNode = audioCtx.createGain();
  gainNode.gain.value = 1.0;   // no extra boost needed — compressor handles levels

  destinationNode = audioCtx.createMediaStreamDestination();

  sourceNode
    .connect(workletNode)
    .connect(compressor)
    .connect(gainNode)
    .connect(destinationNode);

  processedStream = destinationNode.stream;
}

function getOutboundStream() {
  return processedStream || localStream;
}

// ═══════════════════════════════════════════════
//  SOCKET.IO
// ═══════════════════════════════════════════════
function initSocket() {
  socket = io();

  socket.on('connect', () => {
    setConnStatus(true);
    socket.emit('join-room', { roomId, userName: myName });
  });

  socket.on('disconnect', () => setConnStatus(false));

  socket.on('room-joined', ({ userId, users: others }) => {
    myId = userId;
    addParticipant({ id: myId, name: myName, muted: false }, true);
    others.forEach(u => {
      users.set(u.id, u);
      addParticipant(u, false);
      createOffer(u.id);
    });
    sysMsg(`Вы вошли в комнату ${roomId}`);
  });

  socket.on('user-joined', (user) => {
    users.set(user.id, user);
    addParticipant(user, false);
    sysMsg(`${user.name} присоединился`);
  });

  socket.on('user-left', ({ userId }) => {
    const u = users.get(userId);
    sysMsg(`${u?.name || 'Участник'} вышел`);
    users.delete(userId);
    removeParticipant(userId);
    closePeer(userId);
  });

  socket.on('user-mute-changed', ({ userId, muted }) => {
    const u = users.get(userId);
    if (u) u.muted = muted;
    updateParticipantMute(userId, muted);
  });

  socket.on('offer', async ({ from, offer }) => {
    const pc = getOrCreatePeer(from);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer });
  });

  socket.on('answer', async ({ from, answer }) => {
    const p = peers.get(from);
    if (p) await p.pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('ice-candidate', async ({ from, candidate }) => {
    const p = peers.get(from);
    if (p && candidate) {
      try { await p.pc.addIceCandidate(new RTCIceCandidate(candidate)); }
      catch(e) { /* ignore */ }
    }
  });

  socket.on('chat-message', ({ from, name, text, ts }) => {
    appendMessage(from === myId, name, text, ts);
  });
}

// ═══════════════════════════════════════════════
//  WebRTC
// ═══════════════════════════════════════════════
function getOrCreatePeer(remoteId) {
  if (peers.has(remoteId)) return peers.get(remoteId).pc;
  return createPeer(remoteId).pc;
}

function createPeer(remoteId) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  // Add local tracks
  getOutboundStream().getTracks().forEach(t => pc.addTrack(t, getOutboundStream()));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit('ice-candidate', { to: remoteId, candidate });
  };

  pc.ontrack = ({ streams }) => {
    const stream = streams[0];
    playRemoteStream(remoteId, stream);
  };

  pc.onconnectionstatechange = () => {
    console.log(`[Peer ${remoteId}] state: ${pc.connectionState}`);
  };

  const entry = { pc };
  peers.set(remoteId, entry);
  return entry;
}

async function createOffer(remoteId) {
  const pc = getOrCreatePeer(remoteId);
  const offer = await pc.createOffer({ offerToReceiveAudio: true });
  await pc.setLocalDescription(offer);
  socket.emit('offer', { to: remoteId, offer });
}

function closePeer(remoteId) {
  const p = peers.get(remoteId);
  if (p) {
    p.pc.close();
    peers.delete(remoteId);
    cancelAnimationFrame(meterAnimFrames.get(remoteId));
    meterAnimFrames.delete(remoteId);
  }
  // Remove audio element
  const el = document.getElementById('audio-' + remoteId);
  if (el) el.remove();
}

function playRemoteStream(remoteId, stream) {
  let el = document.getElementById('audio-' + remoteId);
  if (!el) {
    el = document.createElement('audio');
    el.id = 'audio-' + remoteId;
    el.autoplay = true;
    el.style.display = 'none';
    document.body.appendChild(el);
  }
  el.srcObject = stream;

  // Volume meter for remote speaker
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  startMeter(remoteId, analyser);
}

// ═══════════════════════════════════════════════
//  VOLUME METER
// ═══════════════════════════════════════════════
let localAnalyser = null;

function startLocalMeter() {
  if (!audioCtx || !sourceNode) return;
  if (localAnalyser) return;
  localAnalyser = audioCtx.createAnalyser();
  localAnalyser.fftSize = 256;
  sourceNode.connect(localAnalyser);
  startMeter(myId, localAnalyser);
}

function startMeter(userId, analyser) {
  const data = new Uint8Array(analyser.frequencyBinCount);
  function tick() {
    analyser.getByteFrequencyData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i];
    const avg = sum / data.length;
    const pct = Math.min(100, avg * 1.5);

    const bar = document.querySelector(`#p-${userId} .vol-bar`);
    if (bar) bar.style.height = pct + '%';

    // Speaking indicator
    const avatar = document.querySelector(`#p-${userId} .p-avatar`);
    if (avatar) avatar.classList.toggle('speaking', pct > 5);

    meterAnimFrames.set(userId, requestAnimationFrame(tick));
  }
  cancelAnimationFrame(meterAnimFrames.get(userId));
  meterAnimFrames.set(userId, requestAnimationFrame(tick));
}

// ═══════════════════════════════════════════════
//  MUTE / NOISE
// ═══════════════════════════════════════════════
function toggleMute() {
  muted = !muted;
  localStream.getAudioTracks().forEach(t => { t.enabled = !muted; });
  const btn = document.getElementById('mute-btn');
  btn.textContent = muted ? '🔇' : '🎤';
  btn.classList.toggle('muted', muted);
  if (socket) socket.emit('toggle-mute', { muted });
  updateParticipantMute(myId, muted);
}

function toggleNoise() {
  noiseEnabled = !noiseEnabled;
  // Tell the AudioWorklet running in the audio thread
  if (workletNode) workletNode.port.postMessage({ enabled: noiseEnabled });
  const btn = document.getElementById('noise-btn');
  btn.classList.toggle('noise-on', noiseEnabled);
  btn.textContent = noiseEnabled ? '🔇' : '🎵';
  showToast(noiseEnabled ? 'Шумоподавление включено' : 'Шумоподавление выключено');
}

// ═══════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('chat-input')) {
    sendChat();
  }
});

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !socket) return;
  socket.emit('chat-message', { text });
  input.value = '';
}

function appendMessage(own, name, text, ts) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg' + (own ? ' own' : '');
  const time = new Date(ts).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <span class="meta">${own ? 'вы' : escHtml(name)} · ${time}</span>
    <div class="bubble">${escHtml(text)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sysMsg(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ═══════════════════════════════════════════════
//  PARTICIPANTS UI
// ═══════════════════════════════════════════════
const COLORS = ['#7c6af7','#4ecdc4','#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd'];
function avatarColor(name) {
  let h = 0; for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}

function addParticipant(user, isMe) {
  users.set(user.id, user);
  const list = document.getElementById('participants-list');
  const col = avatarColor(user.name);
  const initial = (user.name[0] || '?').toUpperCase();
  const div = document.createElement('div');
  div.className = 'participant';
  div.id = 'p-' + user.id;
  div.innerHTML = `
    <div class="p-avatar" style="background:${col}22;color:${col};border:1.5px solid ${col}44">
      ${initial}
      <div class="speaking-ring"></div>
    </div>
    <div class="p-info">
      <div class="p-name${isMe ? ' you' : ''}">${escHtml(user.name)}</div>
    </div>
    <div class="p-mute-icon${user.muted ? ' active' : ''}">🔇</div>
    <div class="vol-bar-wrap"><div class="vol-bar"></div></div>
  `;
  list.appendChild(div);
  updatePCount();

  if (isMe) {
    // slight delay to let AudioContext settle
    setTimeout(startLocalMeter, 200);
  }
}

function removeParticipant(userId) {
  const el = document.getElementById('p-' + userId);
  if (el) el.remove();
  updatePCount();
}

function updateParticipantMute(userId, isMuted) {
  const el = document.querySelector(`#p-${userId} .p-mute-icon`);
  if (el) el.classList.toggle('active', isMuted);
}

function updatePCount() {
  document.getElementById('p-count').textContent = `(${document.getElementById('participants-list').children.length})`;
}

// ═══════════════════════════════════════════════
//  MISC
// ═══════════════════════════════════════════════
function setConnStatus(connected) {
  document.getElementById('conn-dot').className = 'conn-dot' + (connected ? ' connected' : '');
  document.getElementById('conn-label').textContent = connected ? 'Подключено' : 'Отключено';
}

function copyRoomId() {
  navigator.clipboard.writeText(roomId).then(() => showToast('ID комнаты скопирован: ' + roomId));
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function leaveRoom() {
  if (socket) socket.disconnect();
  peers.forEach((_, id) => closePeer(id));
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  location.reload();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
