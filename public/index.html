<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; font-weight: 300; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9em; opacity: 0.9; }
        input {
            width: 100%; padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white; font-size: 1em; outline: none;
        }
        input:focus { border-color: white; background: rgba(255,255,255,0.2); }
        input::placeholder { color: rgba(255,255,255,0.5); }
        .btn {
            width: 100%; padding: 15px; border: none;
            border-radius: 15px; font-size: 1.1em;
            font-weight: 600; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary { background: white; color: #667eea; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .controls { display: flex; gap: 15px; margin-top: 20px; }
        .btn-control {
            flex: 1; padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white; cursor: pointer;
            transition: all 0.3s; font-weight: 500;
            text-align: center;
        }
        .btn-control:hover { background: rgba(255,255,255,0.2); }
        .btn-muted { background: rgba(255,0,0,0.5) !important; border-color: rgba(255,0,0,0.5) !important; }
        .users-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .user-item {
            padding: 10px 15px; margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #4CAF50; flex-shrink: 0;
        }
        .status-muted { background: #f44336; }
        .volume-bar {
            margin: 15px 0; padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px; text-align: center;
        }
        .volume-fill {
            height: 5px; background: #4CAF50;
            border-radius: 3px; transition: width 0.1s;
            margin-top: 5px; width: 0%;
        }
        .status-text {
            margin-top: 10px; padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px; font-size: 0.9em;
            text-align: center;
        }
        .error-message {
            color: #ff6b6b; margin-top: 10px;
            text-align: center; font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="joinScreen">
            <h1>🎙️ Голосовой Чат</h1>
            <div class="input-group">
                <label>Ваше имя:</label>
                <input type="text" id="userName" placeholder="Введите имя" value="User">
            </div>
            <div class="input-group">
                <label>ID комнаты:</label>
                <input type="text" id="roomId" placeholder="Введите ID комнаты" value="general">
            </div>
            <button id="joinBtn" class="btn btn-primary" onclick="chatApp.joinRoom()">
                Присоединиться
            </button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div id="chatScreen" class="hidden">
            <h1>🎙️ <span id="currentRoom">general</span></h1>
            
            <div class="volume-bar">
                🔊 Ваш микрофон
                <div id="volumeFill" class="volume-fill"></div>
            </div>
            
            <div id="connectionStatus" class="status-text">
                🔗 Подключение...
            </div>

            <div class="controls">
                <button id="muteBtn" class="btn-control" onclick="chatApp.toggleMute()">
                    🔊 Микрофон
                </button>
                <button class="btn-control" onclick="chatApp.leaveRoom()">
                    🚪 Выйти
                </button>
            </div>

            <div id="usersList" class="users-list">
                <h3>👥 Участники:</h3>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const chatApp = {
            socket: null,
            mediaStream: null,
            mediaRecorder: null,
            audioContext: null,
            isMuted: false,
            isConnected: false,
            remoteAudio: null,

            init() {
                this.socket = io({ transports: ['websocket', 'polling'] });

                this.socket.on('connect', () => console.log('✅ Подключен'));
                
                this.socket.on('users-update', (users) => {
                    this.renderUsers(users);
                });

                this.socket.on('user-connected', (user) => {
                    console.log('👤', user.name, 'присоединился');
                });

                this.socket.on('user-disconnected', (userId) => {
                    console.log('👋', userId, 'отключился');
                });

                this.socket.on('user-mute-update', (data) => {
                    this.updateUserMute(data.userId, data.muted);
                });

                this.socket.on('mute-status', (muted) => {
                    this.isMuted = muted;
                    this.updateMuteBtn();
                });

                this.socket.on('audio-stream', (data) => {
                    this.playRemoteAudio(data.audio);
                });
            },

            async joinRoom() {
                const userName = document.getElementById('userName').value.trim() || 'User';
                const roomId = document.getElementById('roomId').value.trim() || 'general';
                const joinBtn = document.getElementById('joinBtn');

                try {
                    joinBtn.disabled = true;
                    joinBtn.textContent = 'Подключение...';

                    // Получаем микрофон
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });

                    // Аудиоконтекст для громкости
                    this.audioContext = new AudioContext();
                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    const analyser = this.audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);

                    // MediaRecorder для записи
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
                        ? 'audio/webm;codecs=opus' 
                        : 'audio/webm';

                    this.mediaRecorder = new MediaRecorder(this.mediaStream, {
                        mimeType: mimeType,
                        audioBitsPerSecond: 64000
                    });

                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0 && !this.isMuted && this.isConnected) {
                            const reader = new FileReader();
                            reader.onloadend = () => {
                                const base64 = reader.result.split(',')[1];
                                if (base64 && this.socket.connected) {
                                    this.socket.emit('audio-stream', base64);
                                }
                            };
                            reader.readAsDataURL(event.data);
                        }
                    };

                    // Запускаем запись чанками по 250мс
                    this.mediaRecorder.start(250);

                    // Входим в комнату
                    this.socket.emit('join-room', { roomId, userName });

                    document.getElementById('joinScreen').classList.add('hidden');
                    document.getElementById('chatScreen').classList.remove('hidden');
                    document.getElementById('currentRoom').textContent = roomId;
                    document.getElementById('connectionStatus').textContent = '🟢 Онлайн';
                    
                    this.isConnected = true;
                    this.startVolume(analyser);

                } catch (error) {
                    console.error('Ошибка:', error);
                    document.getElementById('errorMessage').textContent = 'Ошибка: ' + error.message;
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Присоединиться';
                }
            },

            playRemoteAudio(base64Data) {
                try {
                    // Создаём Blob из base64
                    const binaryStr = atob(base64Data);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    
                    const blob = new Blob([bytes], { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    
                    audio.onended = () => URL.revokeObjectURL(url);
                    audio.onerror = () => URL.revokeObjectURL(url);
                    
                    audio.play().catch(e => console.log('Play error:', e));
                } catch (e) {
                    console.error('Audio error:', e);
                }
            },

            startVolume(analyser) {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                const fill = document.getElementById('volumeFill');
                
                const update = () => {
                    if (!this.isConnected) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    const vol = Math.min(100, Math.round((sum / dataArray.length / 255) * 100));
                    if (fill) fill.style.width = vol + '%';
                    requestAnimationFrame(update);
                };
                update();
            },

            toggleMute() {
                if (!this.isConnected) return;
                this.isMuted = !this.isMuted;
                this.socket.emit('toggle-mute');
                this.updateMuteBtn();
                document.getElementById('connectionStatus').textContent = 
                    this.isMuted ? '🔇 Микрофон выключен' : '🟢 Онлайн';
            },

            updateMuteBtn() {
                const btn = document.getElementById('muteBtn');
                if (this.isMuted) {
                    btn.textContent = '🔇 Включить микрофон';
                    btn.classList.add('btn-muted');
                } else {
                    btn.textContent = '🔊 Выключить микрофон';
                    btn.classList.remove('btn-muted');
                }
            },

            renderUsers(users) {
                const list = document.getElementById('usersList');
                list.innerHTML = '<h3>👥 Участники:</h3>';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="status-dot ${u.muted ? 'status-muted' : ''}"></div>
                        <span>${u.name} ${u.id === this.socket?.id ? '(вы)' : ''}</span>
                        ${u.muted ? '<span>🔇</span>' : ''}
                    `;
                    list.appendChild(div);
                });
            },

            updateUserMute(userId, muted) {
                document.querySelectorAll('.user-item').forEach(el => {
                    const dot = el.querySelector('.status-dot');
                    if (muted) dot?.classList.add('status-muted');
                    else dot?.classList.remove('status-muted');
                });
            },

            leaveRoom() {
                if (this.mediaRecorder && this.mediaRecorder.state === 'recording') {
                    this.mediaRecorder.stop();
                }
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(t => t.stop());
                }
                if (this.audioContext) {
                    this.audioContext.close();
                }
                if (this.socket) {
                    this.socket.disconnect();
                }
                
                this.isConnected = false;
                document.getElementById('joinScreen').classList.remove('hidden');
                document.getElementById('chatScreen').classList.add('hidden');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Присоединиться';
                
                this.init();
            }
        };

        window.onload = () => chatApp.init();
        window.onbeforeunload = () => { if (chatApp.isConnected) chatApp.leaveRoom(); };
    </script>
</body>
</html>
