<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9em;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: white;
            background: rgba(255,255,255,0.2);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-control {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-align: center;
        }

        .btn-control:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-muted {
            background: rgba(255, 0, 0, 0.5) !important;
            border-color: rgba(255, 0, 0, 0.5) !important;
        }

        .users-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            flex-shrink: 0;
        }

        .status-muted {
            background: #f44336;
        }

        .volume-bar {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
        }

        .volume-fill {
            height: 5px;
            background: #4CAF50;
            border-radius: 3px;
            transition: width 0.1s;
            margin-top: 5px;
        }

        .status-text {
            margin-top: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.9em;
            text-align: center;
        }

        .error-message {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
            font-size: 0.9em;
        }

        .debug-info {
            margin-top: 10px;
            font-size: 0.8em;
            opacity: 0.7;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран входа -->
        <div id="joinScreen" class="join-screen">
            <h1>🎙️ Голосовой Чат</h1>
            <div class="input-group">
                <label>Ваше имя:</label>
                <input type="text" id="userName" placeholder="Введите имя" value="User">
            </div>
            <div class="input-group">
                <label>ID комнаты:</label>
                <input type="text" id="roomId" placeholder="Введите ID комнаты" value="general">
            </div>
            <button id="joinBtn" class="btn btn-primary" onclick="joinRoom()">
                Присоединиться
            </button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- Экран чата -->
        <div id="chatScreen" class="chat-screen hidden">
            <h1>🎙️ <span id="currentRoom">general</span></h1>
            
            <div class="volume-bar">
                🔊 Ваш микрофон
                <div class="volume-fill" id="volumeFill" style="width: 0%"></div>
            </div>
            
            <div class="status-text" id="connectionStatus">
                🔗 Подключение...
            </div>

            <div class="controls">
                <button id="muteBtn" class="btn-control" onclick="toggleMute()">
                    🔊 Микрофон
                </button>
                <button class="btn-control" onclick="leaveRoom()">
                    🚪 Выйти
                </button>
            </div>

            <div class="users-list" id="usersList">
                <h3>👥 Участники:</h3>
            </div>

            <div class="debug-info" id="debugInfo"></div>
        </div>
    </div>

    <!-- PeerJS для WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let peer;
        let localStream;
        let isMuted = false;
        let myPeerId;
        let peers = {}; // Храним подключения к другим пользователям
        let audioContext;
        let isConnected = false;

        // Инициализация
        function init() {
            socket = io({
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('✅ Socket подключен');
                document.getElementById('debugInfo').textContent = 'Сокет подключен';
            });

            socket.on('existing-users', (users) => {
                console.log('👥 Существующие пользователи:', users);
                users.forEach(user => {
                    connectToPeer(user.peerId);
                });
            });

            socket.on('user-connected', (user) => {
                console.log('👤 Новый пользователь:', user);
                connectToPeer(user.peerId);
                addUserToList(user);
            });

            socket.on('user-disconnected', (userId) => {
                console.log('👋 Пользователь ушел:', userId);
                removeUserFromList(userId);
                if (peers[userId]) {
                    peers[userId].close();
                    delete peers[userId];
                }
            });

            socket.on('users-update', (users) => {
                updateUsersList(users);
            });

            socket.on('user-mute-update', (data) => {
                updateUserMuteStatus(data.userId, data.muted);
            });

            socket.on('disconnect', () => {
                console.log('❌ Сокет отключен');
                document.getElementById('debugInfo').textContent = 'Сокет отключен';
            });
        }

        // Подключение к пиру через WebRTC
        function connectToPeer(peerId) {
            if (peerId === myPeerId || peers[peerId]) return;

            console.log('🔗 Подключаюсь к пиру:', peerId);
            
            const call = peer.call(peerId, localStream, {
                metadata: { type: 'audio' }
            });

            call.on('stream', (remoteStream) => {
                console.log('📡 Получен поток от:', peerId);
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().catch(e => console.log('Ошибка воспроизведения:', e));
                
                // Сохраняем аудио элемент
                peers[peerId] = {
                    call: call,
                    audio: audio
                };
            });

            call.on('error', (error) => {
                console.error('❌ Ошибка звонка:', error);
                document.getElementById('debugInfo').textContent = 'Ошибка WebRTC: ' + error;
            });

            call.on('close', () => {
                console.log('🔒 Звонок закрыт:', peerId);
                if (peers[peerId]) {
                    delete peers[peerId];
                }
            });
        }

        // Присоединение к комнате
        async function joinRoom() {
            const userName = document.getElementById('userName').value.trim() || 'User';
            const roomId = document.getElementById('roomId').value.trim() || 'general';
            const joinBtn = document.getElementById('joinBtn');

            try {
                joinBtn.disabled = true;
                joinBtn.textContent = 'Подключение...';

                // Получаем доступ к микрофону
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000,
                        channelCount: 1
                    }
                });

                console.log('🎤 Микрофон получен');

                // Создаем AudioContext для визуализации
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(localStream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                // Создаем PeerJS подключение
                peer = new Peer(undefined, {
                    host: '0.peerjs.com',
                    port: 443,
                    secure: true,
                    debug: 2
                });

                peer.on('open', (id) => {
                    console.log('🆔 Мой Peer ID:', id);
                    myPeerId = id;
                    
                    // Присоединяемся к комнате
                    socket.emit('join-room', {
                        roomId: roomId,
                        userName: userName,
                        peerId: id
                    });

                    // Переключаем экраны
                    document.getElementById('joinScreen').classList.add('hidden');
                    document.getElementById('chatScreen').classList.remove('hidden');
                    document.getElementById('currentRoom').textContent = roomId;
                    document.getElementById('connectionStatus').textContent = '🟢 Подключен';
                    document.getElementById('debugInfo').textContent = 'Peer ID: ' + id;

                    isConnected = true;

                    // Запускаем мониторинг микрофона
                    startVolumeMeter(analyser);
                });

                // Принимаем входящие звонки
                peer.on('call', (call) => {
                    console.log('📞 Входящий звонок от:', call.peer);
                    call.answer(localStream);
                    
                    call.on('stream', (remoteStream) => {
                        console.log('📡 Получен входящий поток от:', call.peer);
                        const audio = new Audio();
                        audio.srcObject = remoteStream;
                        audio.play().catch(e => console.log('Ошибка воспроизведения:', e));
                        
                        peers[call.peer] = {
                            call: call,
                            audio: audio
                        };
                    });

                    call.on('error', (error) => {
                        console.error('❌ Ошибка входящего звонка:', error);
                    });

                    call.on('close', () => {
                        console.log('🔒 Входящий звонок закрыт:', call.peer);
                        if (peers[call.peer]) {
                            delete peers[call.peer];
                        }
                    });
                });

                peer.on('error', (error) => {
                    console.error('❌ Ошибка PeerJS:', error);
                    document.getElementById('debugInfo').textContent = 'Ошибка PeerJS: ' + error;
                });

                peer.on('disconnected', () => {
                    console.log('⚠️ PeerJS отключен, переподключаю...');
                    peer.reconnect();
                });

            } catch (error) {
                console.error('❌ Ошибка:', error);
                document.getElementById('errorMessage').textContent = 
                    'Ошибка: ' + error.message;
                joinBtn.disabled = false;
                joinBtn.textContent = 'Присоединиться';
            }
        }

        // Индикатор громкости
        function startVolumeMeter(analyser) {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function updateMeter() {
                if (!isConnected) return;
                
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const average = sum / dataArray.length;
                const volume = Math.min(100, Math.round((average / 255) * 100));
                
                document.getElementById('volumeFill').style.width = volume + '%';
                
                requestAnimationFrame(updateMeter);
            }
            
            updateMeter();
        }

        // Мут
        function toggleMute() {
            if (!isConnected || !localStream) return;
            
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMuted;
            });
            
            socket.emit('toggle-mute');
            
            const muteBtn = document.getElementById('muteBtn');
            if (isMuted) {
                muteBtn.textContent = '🔇 Микрофон выключен';
                muteBtn.classList.add('btn-muted');
            } else {
                muteBtn.textContent = '🔊 Микрофон';
                muteBtn.classList.remove('btn-muted');
            }
        }

        // Список пользователей
        function addUserToList(user) {
            const usersList = document.getElementById('usersList');
            const existingUser = document.getElementById('user-' + user.id);
            if (existingUser) return;
            
            const userElement = document.createElement('div');
            userElement.className = 'user-item';
            userElement.id = 'user-' + user.id;
            userElement.innerHTML = `
                <div class="status-dot"></div>
                <span>${user.name}</span>
            `;
            usersList.appendChild(userElement);
        }

        function removeUserFromList(userId) {
            const userElement = document.getElementById('user-' + userId);
            if (userElement) {
                userElement.remove();
            }
        }

        function updateUsersList(users) {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '<h3>👥 Участники:</h3>';
            
            users.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'user-item';
                userElement.id = 'user-' + user.id;
                userElement.innerHTML = `
                    <div class="status-dot ${user.muted ? 'status-muted' : ''}"></div>
                    <span>${user.name} ${user.id === socket.id ? '(вы)' : ''}</span>
                    ${user.muted ? '<span>(🔇)</span>' : ''}
                `;
                usersList.appendChild(userElement);
            });
        }

        function updateUserMuteStatus(userId, muted) {
            const userElement = document.getElementById('user-' + userId);
            if (userElement) {
                const dot = userElement.querySelector('.status-dot');
                if (muted) {
                    dot.classList.add('status-muted');
                } else {
                    dot.classList.remove('status-muted');
                }
            }
        }

        // Выход
        function leaveRoom() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Закрываем все WebRTC соединения
            Object.values(peers).forEach(peer => {
                if (peer.call) peer.call.close();
            });
            peers = {};
            
            if (peer) {
                peer.destroy();
            }
            
            if (audioContext) {
                audioContext.close();
            }
            
            if (socket) {
                socket.disconnect();
            }
            
            isConnected = false;
            
            document.getElementById('joinScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.add('hidden');
            document.getElementById('joinBtn').disabled = false;
            document.getElementById('joinBtn').textContent = 'Присоединиться';
            
            // Переинициализируем сокет
            init();
        }

        // Старт
        window.onload = () => {
            init();
        };

        window.onbeforeunload = () => {
            leaveRoom();
        };
    </script>
</body>
</html>
