<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой чат WebRTC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
        }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 300; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; opacity: 0.9; font-size: 0.9em; }
        input {
            width: 100%; padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white; font-size: 1em; outline: none;
        }
        input:focus { border-color: white; background: rgba(255,255,255,0.2); }
        input::placeholder { color: rgba(255,255,255,0.5); }
        .btn {
            width: 100%; padding: 15px; border: none;
            border-radius: 15px; font-size: 1.1em;
            font-weight: 600; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: white; color: #667eea; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .controls { display: flex; gap: 15px; margin-top: 20px; }
        .btn-control {
            flex: 1; padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white; cursor: pointer;
            font-weight: 500; text-align: center;
        }
        .btn-control:hover { background: rgba(255,255,255,0.2); }
        .btn-muted { background: rgba(255,0,0,0.5) !important; border-color: rgba(255,0,0,0.5) !important; }
        .users-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .user-item {
            padding: 10px 15px; margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #4CAF50; flex-shrink: 0;
        }
        .status-muted { background: #f44336; }
        .volume-bar {
            margin: 15px 0; padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px; text-align: center;
        }
        .volume-fill {
            height: 5px; background: #4CAF50;
            border-radius: 3px; width: 0%;
            margin-top: 5px; transition: width 0.1s;
        }
        .status-text {
            margin: 10px 0; padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.9em; text-align: center;
        }
        .error-message {
            color: #ff6b6b; margin-top: 10px;
            text-align: center; font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="joinScreen">
            <h1>🎙️ Голосовой Чат</h1>
            <div class="input-group">
                <label>Ваше имя:</label>
                <input type="text" id="userName" placeholder="Введите имя" value="User">
            </div>
            <div class="input-group">
                <label>ID комнаты:</label>
                <input type="text" id="roomId" placeholder="Введите ID комнаты" value="general">
            </div>
            <button id="joinBtn" class="btn btn-primary" onclick="chatApp.joinRoom()">
                Присоединиться
            </button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div id="chatScreen" class="hidden">
            <h1>🎙️ <span id="currentRoom">general</span></h1>
            
            <div class="volume-bar">
                🔊 Ваш микрофон
                <div id="volumeFill" class="volume-fill"></div>
            </div>
            
            <div id="connectionStatus" class="status-text">
                🔗 Подключение...
            </div>

            <div class="controls">
                <button id="muteBtn" class="btn-control" onclick="chatApp.toggleMute()">
                    🔊 Микрофон
                </button>
                <button class="btn-control" onclick="chatApp.leaveRoom()">
                    🚪 Выйти
                </button>
            </div>

            <div id="usersList" class="users-list">
                <h3>👥 Участники:</h3>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const chatApp = {
            socket: null,
            localStream: null,
            peerConnections: {},
            isMuted: false,
            isConnected: false,
            audioContext: null,
            analyser: null,

            configuration: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            },

            init() {
                this.socket = io({ transports: ['websocket', 'polling'] });

                this.socket.on('connect', () => console.log('✅ Подключен'));
                
                this.socket.on('users-update', (users) => this.renderUsers(users));

                this.socket.on('user-joined', (user) => {
                    console.log('👤', user.name, 'присоединился');
                    this.createPeerConnection(user.id, true);
                });

                this.socket.on('user-left', (userId) => {
                    console.log('👋', userId, 'отключился');
                    this.closePeerConnection(userId);
                });

                this.socket.on('offer', async ({ offer, from, name }) => {
                    console.log('📞 Offer от', name);
                    const pc = this.createPeerConnection(from, false);
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    this.socket.emit('answer', { answer, to: from });
                });

                this.socket.on('answer', async ({ answer, from }) => {
                    console.log('✅ Answer от', from);
                    const pc = this.peerConnections[from];
                    if (pc) {
                        await pc.setRemoteDescription(new RTCSessionDescription(answer));
                    }
                });

                this.socket.on('ice-candidate', async ({ candidate, from }) => {
                    const pc = this.peerConnections[from];
                    if (pc && candidate) {
                        await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    }
                });

                this.socket.on('user-mute-update', (data) => {
                    this.updateUserMute(data.userId, data.muted);
                });

                this.socket.on('mute-status', (muted) => {
                    this.isMuted = muted;
                    this.updateMuteBtn();
                });
            },

            createPeerConnection(userId, isInitiator) {
                if (this.peerConnections[userId]) return this.peerConnections[userId];

                const pc = new RTCPeerConnection(this.configuration);
                this.peerConnections[userId] = pc;

                // Добавляем локальный аудио поток
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => {
                        pc.addTrack(track, this.localStream);
                    });
                }

                // Получаем удалённый аудио поток
                pc.ontrack = (event) => {
                    console.log('📡 Получен аудио поток от', userId);
                    const audio = new Audio();
                    audio.srcObject = event.streams[0];
                    audio.autoplay = true;
                    audio.play().catch(e => console.log('Play error:', e));
                };

                // Отправляем ICE кандидаты
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        this.socket.emit('ice-candidate', {
                            candidate: event.candidate,
                            to: userId
                        });
                    }
                };

                pc.onconnectionstatechange = () => {
                    console.log(`🔗 Состояние с ${userId}: ${pc.connectionState}`);
                    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                        this.closePeerConnection(userId);
                    }
                };

                // Если мы инициатор - создаём offer
                if (isInitiator) {
                    this.createOffer(pc, userId);
                }

                return pc;
            },

            async createOffer(pc, userId) {
                try {
                    const offer = await pc.createOffer({
                        offerToReceiveAudio: true,
                        offerToReceiveVideo: false
                    });
                    await pc.setLocalDescription(offer);
                    this.socket.emit('offer', { offer, to: userId });
                } catch (e) {
                    console.error('Ошибка создания offer:', e);
                }
            },

            closePeerConnection(userId) {
                const pc = this.peerConnections[userId];
                if (pc) {
                    pc.close();
                    delete this.peerConnections[userId];
                }
            },

            async joinRoom() {
                const userName = document.getElementById('userName').value.trim() || 'User';
                const roomId = document.getElementById('roomId').value.trim() || 'general';
                const joinBtn = document.getElementById('joinBtn');

                try {
                    joinBtn.disabled = true;
                    joinBtn.textContent = 'Подключение...';

                    // Получаем микрофон с Opus кодеком
                    this.localStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                            sampleRate: 48000,
                            channelCount: 1,
                            // Opus кодек даёт лучшее качество для голоса
                            codec: 'opus'
                        }
                    });

                    // AudioContext для визуализации
                    this.audioContext = new AudioContext();
                    const source = this.audioContext.createMediaStreamSource(this.localStream);
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 256;
                    source.connect(this.analyser);

                    // Входим в комнату
                    this.socket.emit('join-room', { roomId, userName });

                    document.getElementById('joinScreen').classList.add('hidden');
                    document.getElementById('chatScreen').classList.remove('hidden');
                    document.getElementById('currentRoom').textContent = roomId;
                    document.getElementById('connectionStatus').textContent = '🟢 Онлайн';
                    
                    this.isConnected = true;
                    this.startVolume();

                } catch (error) {
                    console.error('Ошибка:', error);
                    document.getElementById('errorMessage').textContent = 'Ошибка: ' + error.message;
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Присоединиться';
                }
            },

            startVolume() {
                const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                const fill = document.getElementById('volumeFill');
                
                const update = () => {
                    if (!this.isConnected) return;
                    this.analyser.getByteTimeDomainData(dataArray);
                    let max = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const value = Math.abs(dataArray[i] - 128) / 128;
                        if (value > max) max = value;
                    }
                    const vol = Math.min(100, Math.round(max * 100));
                    if (fill) fill.style.width = vol + '%';
                    requestAnimationFrame(update);
                };
                update();
            },

            toggleMute() {
                if (!this.isConnected || !this.localStream) return;
                this.isMuted = !this.isMuted;
                
                this.localStream.getAudioTracks().forEach(track => {
                    track.enabled = !this.isMuted;
                });
                
                this.socket.emit('toggle-mute');
                this.updateMuteBtn();
                document.getElementById('connectionStatus').textContent = 
                    this.isMuted ? '🔇 Микрофон выключен' : '🟢 Онлайн';
            },

            updateMuteBtn() {
                const btn = document.getElementById('muteBtn');
                if (this.isMuted) {
                    btn.textContent = '🔇 Включить микрофон';
                    btn.classList.add('btn-muted');
                } else {
                    btn.textContent = '🔊 Выключить микрофон';
                    btn.classList.remove('btn-muted');
                }
            },

            renderUsers(users) {
                const list = document.getElementById('usersList');
                list.innerHTML = '<h3>👥 Участники:</h3>';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="status-dot ${u.muted ? 'status-muted' : ''}"></div>
                        <span>${u.name} ${u.id === this.socket?.id ? '(вы)' : ''}</span>
                        ${u.muted ? '<span>🔇</span>' : ''}
                    `;
                    list.appendChild(div);
                });
            },

            updateUserMute(userId, muted) {
                document.querySelectorAll('.user-item').forEach(el => {
                    const dot = el.querySelector('.status-dot');
                    if (muted) dot?.classList.add('status-muted');
                    else dot?.classList.remove('status-muted');
                });
            },

            leaveRoom() {
                // Закрываем все WebRTC соединения
                Object.keys(this.peerConnections).forEach(id => {
                    this.closePeerConnection(id);
                });
                
                if (this.localStream) {
                    this.localStream.getTracks().forEach(t => t.stop());
                }
                if (this.audioContext) {
                    this.audioContext.close();
                }
                if (this.socket) {
                    this.socket.disconnect();
                }
                
                this.isConnected = false;
                this.peerConnections = {};
                
                document.getElementById('joinScreen').classList.remove('hidden');
                document.getElementById('chatScreen').classList.add('hidden');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Присоединиться';
                
                this.init();
            }
        };

        window.onload = () => chatApp.init();
        window.onbeforeunload = () => { if (chatApp.isConnected) chatApp.leaveRoom(); };
    </script>
</body>
</html>
