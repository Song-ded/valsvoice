<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; font-weight: 300; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9em; opacity: 0.9; }
        input {
            width: 100%; padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white; font-size: 1em; outline: none;
        }
        input:focus { border-color: white; background: rgba(255,255,255,0.2); }
        input::placeholder { color: rgba(255,255,255,0.5); }
        .btn {
            width: 100%; padding: 15px; border: none;
            border-radius: 15px; font-size: 1.1em;
            font-weight: 600; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary { background: white; color: #667eea; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .controls { display: flex; gap: 15px; margin-top: 20px; }
        .btn-control {
            flex: 1; padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white; cursor: pointer;
            transition: all 0.3s; font-weight: 500;
            text-align: center;
        }
        .btn-control:hover { background: rgba(255,255,255,0.2); }
        .btn-muted { background: rgba(255,0,0,0.5) !important; border-color: rgba(255,0,0,0.5) !important; }
        .users-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .user-item {
            padding: 10px 15px; margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #4CAF50; flex-shrink: 0;
        }
        .status-muted { background: #f44336; }
        .volume-bar {
            margin: 15px 0; padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px; text-align: center;
        }
        .volume-fill {
            height: 5px; background: #4CAF50;
            border-radius: 3px; transition: width 0.1s;
            margin-top: 5px; width: 0%;
        }
        .status-text {
            margin-top: 10px; padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px; font-size: 0.9em;
            text-align: center;
        }
        .error-message {
            color: #ff6b6b; margin-top: 10px;
            text-align: center; font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="joinScreen">
            <h1>🎙️ Голосовой Чат</h1>
            <div class="input-group">
                <label>Ваше имя:</label>
                <input type="text" id="userName" placeholder="Введите имя" value="User">
            </div>
            <div class="input-group">
                <label>ID комнаты:</label>
                <input type="text" id="roomId" placeholder="Введите ID комнаты" value="general">
            </div>
            <button id="joinBtn" class="btn btn-primary" onclick="chatApp.joinRoom()">
                Присоединиться
            </button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div id="chatScreen" class="hidden">
            <h1>🎙️ <span id="currentRoom">general</span></h1>
            
            <div class="volume-bar">
                🔊 Ваш микрофон
                <div id="volumeFill" class="volume-fill"></div>
            </div>
            
            <div id="connectionStatus" class="status-text">
                🔗 Подключение...
            </div>

            <div class="controls">
                <button id="muteBtn" class="btn-control" onclick="chatApp.toggleMute()">
                    🔊 Микрофон
                </button>
                <button class="btn-control" onclick="chatApp.leaveRoom()">
                    🚪 Выйти
                </button>
            </div>

            <div id="usersList" class="users-list">
                <h3>👥 Участники:</h3>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const chatApp = {
            socket: null,
            audioContext: null,
            mediaStream: null,
            processor: null,
            isMuted: false,
            isConnected: false,
            playbackCtx: null,
            // Буфер для сбора аудиоданных
            audioBuffer: [],
            bufferSize: 4096,
            sendInterval: null,

            init() {
                this.socket = io({ 
                    transports: ['websocket', 'polling'],
                    maxHttpBufferSize: 1e8
                });

                this.socket.on('connect', () => console.log('✅ Подключен'));
                
                this.socket.on('users-update', (users) => this.renderUsers(users));
                this.socket.on('user-connected', (user) => console.log('👤', user.name));
                this.socket.on('user-disconnected', () => this.renderUsers([]));
                
                this.socket.on('user-mute-update', (data) => {
                    this.updateUserMute(data.userId, data.muted);
                });

                this.socket.on('mute-status', (muted) => {
                    this.isMuted = muted;
                    this.updateMuteBtn();
                });

                this.socket.on('audio-stream', (data) => {
                    this.playAudio(data.audio);
                });
            },

            async joinRoom() {
                const userName = document.getElementById('userName').value.trim() || 'User';
                const roomId = document.getElementById('roomId').value.trim() || 'general';
                const joinBtn = document.getElementById('joinBtn');

                try {
                    joinBtn.disabled = true;
                    joinBtn.textContent = 'Подключение...';

                    // Микрофон с высоким качеством
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: false, // Выключаем встроенное шумоподавление
                            autoGainControl: false,   // Выключаем AGC
                            sampleRate: 48000,
                            channelCount: 1
                        }
                    });

                    // AudioContext 48kHz для качества
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 48000
                    });

                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    
                    // Шумоподавление своими руками
                    const highPass = this.audioContext.createBiquadFilter();
                    highPass.type = 'highpass';
                    highPass.frequency.value = 80; // Режем гул
                    
                    const lowPass = this.audioContext.createBiquadFilter();
                    lowPass.type = 'lowpass';
                    lowPass.frequency.value = 8000; // Режем шум выше 8kHz
                    
                    const compressor = this.audioContext.createDynamicsCompressor();
                    compressor.threshold.value = -30;
                    compressor.knee.value = 20;
                    compressor.ratio.value = 8;
                    compressor.attack.value = 0.005;
                    compressor.release.value = 0.1;

                    // Анализатор
                    const analyser = this.audioContext.createAnalyser();
                    analyser.fftSize = 512;

                    // ScriptProcessor с большим буфером для качества
                    this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);
                    
                    // Цепочка обработки
                    source.connect(highPass);
                    highPass.connect(lowPass);
                    lowPass.connect(compressor);
                    compressor.connect(analyser);
                    compressor.connect(this.processor);
                    this.processor.connect(this.audioContext.destination);

                    // Собираем и отправляем аудио
                    this.processor.onaudioprocess = (e) => {
                        if (!this.isMuted && this.isConnected) {
                            const input = e.inputBuffer.getChannelData(0);
                            this.audioBuffer.push(...Array.from(input));
                            
                            // Отправляем когда накопилось достаточно
                            if (this.audioBuffer.length >= this.bufferSize) {
                                this.sendAudioChunk();
                            }
                        }
                    };

                    // Периодическая отправка остатков
                    this.sendInterval = setInterval(() => {
                        if (this.audioBuffer.length > 0 && !this.isMuted && this.isConnected) {
                            this.sendAudioChunk();
                        }
                    }, 50);

                    this.socket.emit('join-room', { roomId, userName });

                    document.getElementById('joinScreen').classList.add('hidden');
                    document.getElementById('chatScreen').classList.remove('hidden');
                    document.getElementById('currentRoom').textContent = roomId;
                    document.getElementById('connectionStatus').textContent = '🟢 Онлайн';
                    
                    this.isConnected = true;
                    this.startVolume(analyser);

                } catch (error) {
                    console.error('Ошибка:', error);
                    document.getElementById('errorMessage').textContent = 'Ошибка: ' + error.message;
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Присоединиться';
                }
            },

            sendAudioChunk() {
                // Берём кусок буфера
                const chunk = this.audioBuffer.splice(0, this.bufferSize);
                
                // Float32 -> Int16
                const int16 = new Int16Array(chunk.length);
                for (let i = 0; i < chunk.length; i++) {
                    const s = Math.max(-1, Math.min(1, chunk[i]));
                    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                
                // В base64
                const uint8 = new Uint8Array(int16.buffer);
                let binary = '';
                for (let i = 0; i < uint8.length; i++) {
                    binary += String.fromCharCode(uint8[i]);
                }
                
                this.socket.emit('audio-stream', btoa(binary));
            },

            playAudio(base64Data) {
                try {
                    const binary = atob(base64Data);
                    const uint8 = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) {
                        uint8[i] = binary.charCodeAt(i);
                    }
                    
                    const int16 = new Int16Array(uint8.buffer);
                    const float32 = new Float32Array(int16.length);
                    
                    // Плавное преобразование
                    for (let i = 0; i < int16.length; i++) {
                        float32[i] = int16[i] / 32768.0;
                    }
                    
                    if (!this.playbackCtx) {
                        this.playbackCtx = new (window.AudioContext || window.webkitAudioContext)({
                            sampleRate: 48000
                        });
                    }
                    
                    const buffer = this.playbackCtx.createBuffer(1, float32.length, 48000);
                    buffer.getChannelData(0).set(float32);
                    
                    const source = this.playbackCtx.createBufferSource();
                    source.buffer = buffer;
                    
                    // Сглаживание для избежания щелчков
                    const gainNode = this.playbackCtx.createGain();
                    gainNode.gain.value = 1.0;
                    
                    source.connect(gainNode);
                    gainNode.connect(this.playbackCtx.destination);
                    source.start();
                    
                } catch (e) {
                    console.error('Ошибка воспроизведения:', e);
                }
            },

            startVolume(analyser) {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                const fill = document.getElementById('volumeFill');
                
                const update = () => {
                    if (!this.isConnected) return;
                    analyser.getByteTimeDomainData(dataArray);
                    let max = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const value = Math.abs(dataArray[i] - 128) / 128;
                        if (value > max) max = value;
                    }
                    const vol = Math.min(100, Math.round(max * 100));
                    if (fill) fill.style.width = vol + '%';
                    requestAnimationFrame(update);
                };
                update();
            },

            toggleMute() {
                if (!this.isConnected) return;
                this.isMuted = !this.isMuted;
                this.socket.emit('toggle-mute');
                this.updateMuteBtn();
                document.getElementById('connectionStatus').textContent = 
                    this.isMuted ? '🔇 Микрофон выключен' : '🟢 Онлайн';
            },

            updateMuteBtn() {
                const btn = document.getElementById('muteBtn');
                if (this.isMuted) {
                    btn.textContent = '🔇 Включить микрофон';
                    btn.classList.add('btn-muted');
                } else {
                    btn.textContent = '🔊 Выключить микрофон';
                    btn.classList.remove('btn-muted');
                }
            },

            renderUsers(users) {
                const list = document.getElementById('usersList');
                list.innerHTML = '<h3>👥 Участники:</h3>';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="status-dot ${u.muted ? 'status-muted' : ''}"></div>
                        <span>${u.name} ${u.id === this.socket?.id ? '(вы)' : ''}</span>
                        ${u.muted ? '<span>🔇</span>' : ''}
                    `;
                    list.appendChild(div);
                });
            },

            updateUserMute(userId, muted) {
                document.querySelectorAll('.user-item').forEach(el => {
                    const dot = el.querySelector('.status-dot');
                    if (muted) dot?.classList.add('status-muted');
                    else dot?.classList.remove('status-muted');
                });
            },

            leaveRoom() {
                if (this.sendInterval) {
                    clearInterval(this.sendInterval);
                    this.sendInterval = null;
                }
                if (this.processor) {
                    this.processor.disconnect();
                    this.processor = null;
                }
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(t => t.stop());
                }
                if (this.audioContext) {
                    this.audioContext.close();
                }
                if (this.playbackCtx) {
                    this.playbackCtx.close();
                }
                if (this.socket) {
                    this.socket.disconnect();
                }
                
                this.isConnected = false;
                this.audioBuffer = [];
                
                document.getElementById('joinScreen').classList.remove('hidden');
                document.getElementById('chatScreen').classList.add('hidden');
                document.getElementById('joinBtn').disabled = false;
                document.getElementById('joinBtn').textContent = 'Присоединиться';
                
                this.init();
            }
        };

        window.onload = () => chatApp.init();
        window.onbeforeunload = () => { if (chatApp.isConnected) chatApp.leaveRoom(); };
    </script>
</body>
</html>
