<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .join-screen, .chat-screen {
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9em;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: white;
            background: rgba(255,255,255,0.2);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-control {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-control:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-muted {
            background: rgba(255, 0, 0, 0.3);
            border-color: rgba(255, 0, 0, 0.5);
        }

        .users-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .user-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
        }

        .status-muted {
            background: #f44336;
        }

        .volume-indicator {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
            font-size: 0.9em;
        }

        .noise-status {
            margin-top: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.8em;
            text-align: center;
        }

        .error-message {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран присоединения -->
        <div id="joinScreen" class="join-screen">
            <h1>🎙️ Голосовой Чат</h1>
            <div class="input-group">
                <label>Ваше имя:</label>
                <input type="text" id="userName" placeholder="Введите имя" value="Пользователь">
            </div>
            <div class="input-group">
                <label>ID комнаты:</label>
                <input type="text" id="roomId" placeholder="Введите ID комнаты" value="general">
            </div>
            <button class="btn btn-primary" onclick="joinRoom()">Присоединиться</button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- Экран чата -->
        <div id="chatScreen" class="chat-screen hidden">
            <h1>🎙️ Комната: <span id="currentRoom"></span></h1>
            
            <div class="volume-indicator">
                🔊 Уровень микрофона: <span id="volumeLevel">0%</span>
            </div>
            
            <div class="noise-status" id="noiseStatus">
                🎧 Шумоподавление: АКТИВНО
            </div>

            <div class="controls">
                <button id="muteBtn" class="btn-control" onclick="toggleMute()">
                    🔊 Микрофон
                </button>
                <button class="btn-control" onclick="leaveRoom()">
                    🚪 Выйти
                </button>
            </div>

            <div class="users-list" id="usersList">
                <h3>👥 Участники:</h3>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Глобальные переменные
        let socket;
        let audioContext;
        let mediaStream;
        let isMuted = false;
        let isConnected = false;
        let mediaRecorder;
        let audioQueue = [];
        let isPlaying = false;
        
        // Очередь для воспроизведения аудио
        async function playNextInQueue() {
            if (isPlaying || audioQueue.length === 0) return;
            
            isPlaying = true;
            const audioData = audioQueue.shift();
            
            try {
                const audioBlob = new Blob([audioData], { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    isPlaying = false;
                    playNextInQueue();
                };
                
                audio.onerror = () => {
                    URL.revokeObjectURL(audioUrl);
                    isPlaying = false;
                    playNextInQueue();
                };
                
                await audio.play();
            } catch (error) {
                console.error('Ошибка воспроизведения:', error);
                isPlaying = false;
                playNextInQueue();
            }
        }

        // Инициализация WebSocket соединения
        function initSocket() {
            socket = io({
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('✅ Подключено к серверу');
            });

            socket.on('users-update', (users) => {
                updateUsersList(users);
            });

            socket.on('user-connected', (user) => {
                console.log(`${user.name} присоединился`);
            });

            socket.on('user-disconnected', (userId) => {
                console.log(`Пользователь ${userId} отключился`);
            });

            socket.on('mute-status', (muted) => {
                isMuted = muted;
                updateMuteButton();
            });

            socket.on('audio-data', (data) => {
                // Добавляем в очередь воспроизведения
                if (data && data.audio) {
                    try {
                        const binaryString = atob(data.audio);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        audioQueue.push(bytes);
                        playNextInQueue();
                    } catch (error) {
                        console.error('Ошибка обработки аудио:', error);
                    }
                }
            });

            socket.on('disconnect', () => {
                console.log('❌ Отключено от сервера');
            });
        }

        // Присоединение к комнате
        async function joinRoom() {
            const userName = document.getElementById('userName').value.trim() || 'Гость';
            const roomId = document.getElementById('roomId').value.trim() || 'general';
            
            try {
                // Запрашиваем доступ к микрофону
                const constraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000,
                        channelCount: 1
                    }
                };
                
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Создаем AudioContext для обработки
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000
                });
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                
                // Создаем фильтры для шумоподавления
                const highPass = audioContext.createBiquadFilter();
                highPass.type = 'highpass';
                highPass.frequency.value = 100; // Убираем низкочастотный гул
                
                const lowPass = audioContext.createBiquadFilter();
                lowPass.type = 'lowpass';
                lowPass.frequency.value = 8000; // Убираем высокочастотный шум
                
                const compressor = audioContext.createDynamicsCompressor();
                compressor.threshold.value = -50;
                compressor.knee.value = 40;
                compressor.ratio.value = 12;
                compressor.attack.value = 0.003;
                compressor.release.value = 0.25;
                
                // Анализатор для отображения уровня
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                // Цепочка: source -> highPass -> lowPass -> compressor -> analyser -> destination
                source.connect(highPass);
                highPass.connect(lowPass);
                lowPass.connect(compressor);
                compressor.connect(analyser);
                
                // Создаем выходной поток
                const destination = audioContext.createMediaStreamDestination();
                analyser.connect(destination);
                
                // Присоединяемся к комнате
                socket.emit('join-room', { roomId, userName });
                
                // Переключаем экраны
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('chatScreen').classList.remove('hidden');
                document.getElementById('currentRoom').textContent = roomId;
                
                isConnected = true;
                
                // Запускаем мониторинг уровня
                startVolumeMonitoring(analyser);
                
                // Запускаем запись и отправку аудио
                startRecording(destination.stream);
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('errorMessage').textContent = 
                    '❌ Ошибка доступа к микрофону: ' + error.message;
            }
        }

        // Мониторинг уровня звука
        function startVolumeMonitoring(analyser) {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function updateLevel() {
                if (!isConnected) return;
                
                analyser.getByteFrequencyData(dataArray);
                
                // Вычисляем средний уровень
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const average = sum / dataArray.length;
                
                // Нормализуем в проценты
                const percentage = Math.round((average / 255) * 100);
                document.getElementById('volumeLevel').textContent = percentage + '%';
                
                requestAnimationFrame(updateLevel);
            }
            
            updateLevel();
        }

        // Запись и отправка аудио
        function startRecording(stream) {
            const options = {
                mimeType: 'audio/webm;codecs=opus',
                audioBitsPerSecond: 32000
            };
            
            // Проверяем поддержку формата
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options.mimeType = 'audio/webm';
            }
            
            mediaRecorder = new MediaRecorder(stream, options);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0 && !isMuted && isConnected) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64data = reader.result.split(',')[1];
                        if (base64data) {
                            socket.emit('audio-data', base64data);
                        }
                    };
                    reader.readAsDataURL(event.data);
                }
            };
            
            mediaRecorder.onerror = (error) => {
                console.error('Ошибка записи:', error);
            };
            
            // Записываем и отправляем чанки каждые 100мс
            mediaRecorder.start(100);
            console.log('🎙️ Запись начата');
        }

        // Переключение мута
        function toggleMute() {
            if (!isConnected) return;
            
            isMuted = !isMuted;
            socket.emit('toggle-mute');
            updateMuteButton();
            
            // Визуальная обратная связь
            document.getElementById('noiseStatus').textContent = 
                isMuted ? '🔇 Микрофон выключен' : '🎧 Шумоподавление: АКТИВНО';
        }

        // Обновление кнопки мута
        function updateMuteButton() {
            const muteBtn = document.getElementById('muteBtn');
            if (isMuted) {
                muteBtn.textContent = '🔇 Микрофон выключен';
                muteBtn.classList.add('btn-muted');
            } else {
                muteBtn.textContent = '🔊 Микрофон';
                muteBtn.classList.remove('btn-muted');
            }
        }

        // Обновление списка пользователей
        function updateUsersList(users) {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '<h3>👥 Участники:</h3>';
            
            users.forEach(user => {
                const userElement = document.createElement('div');
                userElement.className = 'user-item';
                userElement.innerHTML = `
                    <div class="status-indicator ${user.muted ? 'status-muted' : ''}"></div>
                    <span>${user.name}</span>
                    ${user.muted ? '<span style="font-size: 0.8em;">(🔇)</span>' : ''}
                `;
                usersList.appendChild(userElement);
            });
        }

        // Выход из комнаты
        function leaveRoom() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            
            if (audioContext) {
                audioContext.close();
            }
            
            if (socket) {
                socket.disconnect();
            }
            
            isConnected = false;
            audioQueue = [];
            isPlaying = false;
            
            document.getElementById('joinScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.add('hidden');
            
            // Переподключаем сокет
            initSocket();
        }

        // Инициализация при загрузке
        window.onload = () => {
            initSocket();
        };

        // Очистка при закрытии
        window.onbeforeunload = () => {
            leaveRoom();
        };
    </script>
</body>
</html>
