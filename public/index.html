<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .hidden {
            display: none !important;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9em;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
            outline: none;
        }

        input:focus {
            border-color: white;
            background: rgba(255,255,255,0.2);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-control {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-align: center;
        }

        .btn-control:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-muted {
            background: rgba(255, 0, 0, 0.5) !important;
            border-color: rgba(255, 0, 0, 0.5) !important;
        }

        .users-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            flex-shrink: 0;
        }

        .status-muted {
            background: #f44336;
        }

        .volume-bar {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
        }

        .volume-fill {
            height: 5px;
            background: #4CAF50;
            border-radius: 3px;
            transition: width 0.1s;
            margin-top: 5px;
            width: 0%;
        }

        .status-text {
            margin-top: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.9em;
            text-align: center;
        }

        .error-message {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран входа -->
        <div id="joinScreen">
            <h1>🎙️ Голосовой Чат</h1>
            <div class="input-group">
                <label>Ваше имя:</label>
                <input type="text" id="userName" placeholder="Введите имя" value="User">
            </div>
            <div class="input-group">
                <label>ID комнаты:</label>
                <input type="text" id="roomId" placeholder="Введите ID комнаты" value="general">
            </div>
            <button id="joinBtn" class="btn btn-primary" onclick="window.chatApp.joinRoom()">
                Присоединиться
            </button>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- Экран чата -->
        <div id="chatScreen" class="hidden">
            <h1>🎙️ <span id="currentRoom">general</span></h1>
            
            <div class="volume-bar">
                🔊 Ваш микрофон
                <div id="volumeFill" class="volume-fill"></div>
            </div>
            
            <div id="connectionStatus" class="status-text">
                🔗 Подключение...
            </div>

            <div class="controls">
                <button id="muteBtn" class="btn-control" onclick="window.chatApp.toggleMute()">
                    🔊 Микрофон
                </button>
                <button class="btn-control" onclick="window.chatApp.leaveRoom()">
                    🚪 Выйти
                </button>
            </div>

            <div id="usersList" class="users-list">
                <h3>👥 Участники:</h3>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Основной объект приложения
        window.chatApp = {
            socket: null,
            mediaStream: null,
            mediaRecorder: null,
            audioContext: null,
            isMuted: false,
            isConnected: false,
            
            // Очередь аудио для воспроизведения
            audioQueue: [],
            isPlaying: false,
            currentAudio: null,

            init: function() {
                this.socket = io({
                    transports: ['websocket', 'polling']
                });

                this.socket.on('connect', () => {
                    console.log('✅ Подключен к серверу');
                });

                this.socket.on('users-update', (users) => {
                    this.updateUsersList(users);
                });

                this.socket.on('user-connected', (user) => {
                    console.log('👤 Присоединился:', user.name);
                });

                this.socket.on('user-disconnected', (userId) => {
                    console.log('👋 Отключился:', userId);
                });

                this.socket.on('user-mute-update', (data) => {
                    this.updateUserMuteStatus(data.userId, data.muted);
                });

                this.socket.on('mute-status', (muted) => {
                    this.isMuted = muted;
                    this.updateMuteButton();
                });

                this.socket.on('audio-stream', (data) => {
                    this.playAudio(data.audio);
                });

                this.socket.on('disconnect', () => {
                    console.log('❌ Отключен от сервера');
                });
            },

            joinRoom: async function() {
                const userName = document.getElementById('userName').value.trim() || 'User';
                const roomId = document.getElementById('roomId').value.trim() || 'general';
                const joinBtn = document.getElementById('joinBtn');

                try {
                    joinBtn.disabled = true;
                    joinBtn.textContent = 'Подключение...';

                    // Получаем доступ к микрофону
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                            sampleRate: 48000,
                            channelCount: 1
                        }
                    });

                    console.log('🎤 Микрофон получен');

                    // Создаем AudioContext для визуализации
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    const analyser = this.audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);

                    // Создаем MediaRecorder для записи
                    const options = {
                        mimeType: 'audio/webm;codecs=opus',
                        audioBitsPerSecond: 64000
                    };

                    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                        options.mimeType = 'audio/webm';
                    }

                    this.mediaRecorder = new MediaRecorder(this.mediaStream, options);
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0 && !this.isMuted && this.isConnected) {
                            this.sendAudioData(event.data);
                        }
                    };

                    // Записываем и отправляем каждые 100мс
                    this.mediaRecorder.start(100);

                    // Присоединяемся к комнате
                    this.socket.emit('join-room', { roomId, userName });

                    // Переключаем экраны
                    document.getElementById('joinScreen').classList.add('hidden');
                    document.getElementById('chatScreen').classList.remove('hidden');
                    document.getElementById('currentRoom').textContent = roomId;
                    document.getElementById('connectionStatus').textContent = '🟢 Онлайн';
                    
                    this.isConnected = true;

                    // Запускаем мониторинг громкости
                    this.startVolumeMeter(analyser);

                    console.log('✅ Вошли в комнату:', roomId);

                } catch (error) {
                    console.error('❌ Ошибка:', error);
                    document.getElementById('errorMessage').textContent = 
                        'Ошибка: ' + error.message;
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Присоединиться';
                }
            },

            sendAudioData: function(audioBlob) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64data = reader.result.split(',')[1];
                    if (base64data && this.socket.connected) {
                        this.socket.emit('audio-stream', base64data);
                    }
                };
                reader.readAsDataURL(audioBlob);
            },

            playAudio: function(base64Audio) {
                try {
                    // Конвертируем base64 в blob
                    const binaryString = atob(base64Audio);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    
                    const audioBlob = new Blob([bytes], { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    
                    audio.onended = () => {
                        URL.revokeObjectURL(audioUrl);
                    };
                    
                    audio.play().catch(e => console.log('Ошибка воспроизведения:', e));
                    
                } catch (error) {
                    console.error('Ошибка декодирования аудио:', error);
                }
            },

            startVolumeMeter: function(analyser) {
                const self = this;
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                function updateMeter() {
                    if (!self.isConnected) return;
                    
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    const average = sum / dataArray.length;
                    const volume = Math.min(100, Math.round((average / 255) * 100));
                    
                    const volumeFill = document.getElementById('volumeFill');
                    if (volumeFill) {
                        volumeFill.style.width = volume + '%';
                    }
                    
                    requestAnimationFrame(updateMeter);
                }
                
                updateMeter();
            },

            toggleMute: function() {
                if (!this.isConnected || !this.mediaStream) return;
                
                this.isMuted = !this.isMuted;
                
                // Отключаем аудио дорожку
                this.mediaStream.getAudioTracks().forEach(track => {
                    track.enabled = !this.isMuted;
                });
                
                this.socket.emit('toggle-mute');
                this.updateMuteButton();
                
                document.getElementById('connectionStatus').textContent = 
                    this.isMuted ? '🔇 Микрофон выключен' : '🟢 Онлайн';
            },

            updateMuteButton: function() {
                const muteBtn = document.getElementById('muteBtn');
                if (this.isMuted) {
                    muteBtn.textContent = '🔇 Включить микрофон';
                    muteBtn.classList.add('btn-muted');
                } else {
                    muteBtn.textContent = '🔊 Выключить микрофон';
                    muteBtn.classList.remove('btn-muted');
                }
            },

            updateUsersList: function(users) {
                const usersList = document.getElementById('usersList');
                usersList.innerHTML = '<h3>👥 Участники:</h3>';
                
                users.forEach(user => {
                    const userElement = document.createElement('div');
                    userElement.className = 'user-item';
                    userElement.innerHTML = `
                        <div class="status-dot ${user.muted ? 'status-muted' : ''}"></div>
                        <span>${user.name} ${user.id === this.socket.id ? '(вы)' : ''}</span>
                        ${user.muted ? '<span>🔇</span>' : ''}
                    `;
                    usersList.appendChild(userElement);
                });
            },

            updateUserMuteStatus: function(userId, muted) {
                const usersList = document.getElementById('usersList');
                const userItems = usersList.querySelectorAll('.user-item');
                userItems.forEach(item => {
                    if (item.textContent.includes(userId)) {
                        const dot = item.querySelector('.status-dot');
                        if (muted) {
                            dot.classList.add('status-muted');
                        } else {
                            dot.classList.remove('status-muted');
                        }
                    }
                });
            },

            leaveRoom: function() {
                // Останавливаем запись
                if (this.mediaRecorder && this.mediaRecorder.state === 'recording') {
                    this.mediaRecorder.stop();
                }
                
                // Останавливаем медиа поток
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }
                
                // Закрываем аудио контекст
                if (this.audioContext) {
                    this.audioContext.close();
                }
                
                // Отключаем сокет
                if (this.socket) {
                    this.socket.disconnect();
                }
                
                this.isConnected = false;
                
                // Возвращаемся на экран входа
                document.getElementById('joinScreen').classList.remove('hidden');
                document.getElementById('chatScreen').classList.add('hidden');
                
                const joinBtn = document.getElementById('joinBtn');
                joinBtn.disabled = false;
                joinBtn.textContent = 'Присоединиться';
                
                // Переинициализируем
                this.init();
                
                console.log('👋 Вышли из комнаты');
            }
        };

        // Запуск при загрузке
        window.onload = () => {
            window.chatApp.init();
        };

        // Очистка при закрытии
        window.onbeforeunload = () => {
            if (window.chatApp.isConnected) {
                window.chatApp.leaveRoom();
            }
        };
    </script>
</body>
</html>
